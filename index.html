<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="1 Thing a Day">
    <meta name="theme-color" content="#0f172a">
    <title>1 Thing a Day - Daily Learn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            color: #f1f5f9;
        }

        /* Container principal */
        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header style iPhone */
        .status-bar {
            padding-top: env(safe-area-inset-top, 20px);
            padding-left: 24px;
            padding-right: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .streak-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .streak-badge::before {
            content: "🔥";
            font-size: 14px;
        }

        .daily-badge {
            background: rgba(59, 130, 246, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Zone swipe principale */
        .swipe-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: grab;
        }

        .swipe-container:active {
            cursor: grabbing;
        }

        /* Carte principale */
        .card {
            position: absolute;
            width: calc(100% - 32px);
            max-width: 380px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }

        /* Animation swipe */
        .card.swiping-left {
            transform: translateX(-120%) rotate(-8deg);
            opacity: 0;
        }

        .card.swiping-right {
            transform: translateX(120%) rotate(8deg);
            opacity: 0;
        }

        /* Catégorie */
        .category {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            color: #60a5fa;
        }

        /* Titre */
        .card h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        /* Texte */
        .card p {
            font-size: 18px;
            line-height: 1.5;
            color: #cbd5e1;
            margin-bottom: 28px;
        }

        /* Bouton info */
        .info-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
        }

        .info-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }

        /* Indicateur swipe */
        .swipe-indicator {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: #64748b;
            display: flex;
            justify-content: center;
            gap: 32px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            margin: 0 20px;
            border-radius: 40px;
        }

        .swipe-indicator span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Menu bas */
        .bottom-menu {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 16px;
            border-radius: 24px;
        }

        .menu-item.active {
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
        }

        .menu-item span:first-child {
            font-size: 22px;
        }

        /* Vue historique */
        .history-view, .stats-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
            padding: 80px 20px 100px;
        }

        .history-view.open, .stats-view.open {
            transform: translateX(0);
        }

        .history-view h2, .stats-view h2 {
            font-size: 28px;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .history-item {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 3px solid #60a5fa;
        }

        .history-item h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .history-item p {
            font-size: 14px;
            color: #94a3b8;
        }

        .close-btn {
            position: absolute;
            top: 60px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 24px;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }

        .stats-card {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats-number {
            font-size: 48px;
            font-weight: 700;
            color: #60a5fa;
        }

        /* Cache scroll */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="status-bar">
        <div class="streak-badge" id="streakDisplay">0</div>
        <div class="daily-badge" id="dailyFactIndicator">📅 Fait du jour</div>
    </div>

    <div class="swipe-container" id="swipeContainer">
        <div class="card" id="card">
            <div class="category" id="category">Science</div>
            <h1 id="title">Chargement...</h1>
            <p id="text">Découvrez votre premier fait du jour</p>
            <button class="info-btn" id="infoBtn">ℹ️ En savoir plus</button>
        </div>
    </div>

    <div class="swipe-indicator">
        <span>⬅️ Ignorer</span>
        <span>➡️ J'ai appris</span>
    </div>

    <div class="bottom-menu">
        <button class="menu-item" data-view="daily">
            <span>📚</span>
            <span>Daily</span>
        </button>
        <button class="menu-item" data-view="history">
            <span>📖</span>
            <span>Historique</span>
        </button>
        <button class="menu-item" data-view="stats">
            <span>📊</span>
            <span>Stats</span>
        </button>
    </div>
</div>

<div class="history-view" id="historyView">
    <button class="close-btn" onclick="closeHistory()">✕</button>
    <h2>📖 Ce que j'ai appris</h2>
    <div id="historyList"></div>
</div>

<div class="stats-view" id="statsView">
    <button class="close-btn" onclick="closeStats()">✕</button>
    <h2>📊 Mes statistiques</h2>
    <div class="stats-card">
        <div class="stats-number" id="statTotalLearned">0</div>
        <div>faits appris</div>
    </div>
    <div class="stats-card">
        <div class="stats-number" id="statStreak">0</div>
        <div>jours consécutifs 🔥</div>
    </div>
    <div class="stats-card">
        <div class="stats-number" id="statCategories">0</div>
        <div>catégories explorées</div>
    </div>
</div>

<script>
    // ==================== DONNÉES ====================
    const FACTS = [
        { id: 1, title: "Origine du mot 'Quiz'", text: "Le mot 'quiz' vient d'un pari à Dublin au 18e siècle. Un propriétaire de théâtre aurait parié qu'il pouvait inventer un nouveau mot en 24 heures. Il fit écrire 'QUIZ' sur les murs de la ville, et tout le monde se demanda ce que cela signifiait.", category: "langue", difficulty: 1 },
        { id: 2, title: "Les bananes sont radioactives", text: "Les bananes sont naturellement radioactives à cause de leur teneur élevée en potassium-40. Mais ne vous inquiétez pas, il faudrait manger des millions de bananes pour ressentir des effets néfastes.", category: "science", difficulty: 1 },
        { id: 3, title: "L'Octopus de Paul", text: "Paul l'Octopus est devenu célèbre en 2010 pour avoir prédit correctement 12 matchs de la Coupe du Monde sur 14, dont la finale. Il choisissait entre deux boîtes avec des drapeaux.", category: "histoire", difficulty: 2 },
        { id: 4, title: "Pourquoi les flamants sont roses", text: "Les flamants roses doivent leur couleur aux algues et aux crustacés qu'ils mangent, riches en bêta-carotène. En captivité, ils peuvent perdre leur couleur si leur alimentation ne contient pas assez de ces pigments.", category: "science", difficulty: 1 },
        { id: 5, title: "Le premier programmeur était une femme", text: "Ada Lovelace, mathématicienne anglaise du 19e siècle, est considérée comme la première programmeuse de l'histoire. Elle a écrit le premier algorithme destiné à être exécuté par une machine.", category: "histoire", difficulty: 2 },
        { id: 6, title: "Le jour le plus long de l'année", text: "Le solstice d'été (21 juin) est le jour le plus long de l'année dans l'hémisphère nord, avec plus de 16 heures de lumière dans certaines régions.", category: "science", difficulty: 1 },
        { id: 7, title: "Pourquoi bâille-t-on ?", text: "Le bâillement n'est pas seulement un signe de fatigue. Il aide à refroidir le cerveau et à augmenter l'oxygénation. Et oui, le bâillement est contagieux même chez les chiens!", category: "science", difficulty: 2 },
        { id: 8, title: "Le volcan le plus haut du système solaire", text: "Olympus Mons sur Mars est un volcan de 22 km de haut, soit presque trois fois la hauteur de l'Everest. Sa base est large comme la France!", category: "science", difficulty: 2 },
        { id: 9, title: "Napoléon et les lapins", text: "Napoléon a un jour été attaqué par une horde de lapins lors d'une chasse. Les lapins apprivoisés se sont rués vers lui et son groupe, les prenant pour des nourrisseurs.", category: "histoire", difficulty: 3 },
        { id: 10, title: "Le mot le plus long en français", text: "Anticonstitutionnellement (25 lettres) est souvent cité, mais 'hexakosioihexekontahexaphobie' (peur du nombre 666) est encore plus long.", category: "langue", difficulty: 3 },
        { id: 11, title: "Les abeilles dansent", text: "Les abeilles communiquent la direction et la distance des sources de nourriture grâce à une 'danse frétillante'. Une vraie chorégraphie géolocalisée!", category: "science", difficulty: 2 },
        { id: 12, title: "La Tour Eiffel change de taille", text: "La Tour Eiffel peut mesurer jusqu'à 15 cm de plus en été à cause de la dilatation thermique du fer.", category: "histoire", difficulty: 1 },
        { id: 13, title: "Oxford plus vieux que les Aztèques", text: "L'Université d'Oxford enseignait déjà depuis 250 ans quand l'empire Aztèque a été fondé (1428).", category: "histoire", difficulty: 2 },
        { id: 14, title: "Le fromage le plus cher du monde", text: "Le pule, fabriqué à partir de lait d'ânesse en Serbie, peut coûter jusqu'à 1000€ le kilo. Il faut 25 litres de lait pour 1 kilo de fromage!", category: "langue", difficulty: 2 },
        { id: 15, title: "Les koalas ont des empreintes digitales", text: "Les koalas ont des empreintes digitales presque identiques à celles des humains, même les experts peuvent les confondre au microscope.", category: "science", difficulty: 2 },
        { id: 16, title: "Pourquoi 60 minutes ?", text: "Les Babyloniens comptaient en base 60 il y a 4000 ans. C'est pour cela qu'une heure fait 60 minutes et un cercle 360 degrés.", category: "histoire", difficulty: 2 },
        { id: 17, title: "L'odeur de la pluie", text: "La pétrichor est l'odeur caractéristique après la pluie. Elle vient d'huiles produites par certaines plantes et de bactéries dans le sol.", category: "science", difficulty: 1 },
        { id: 18, title: "Cléopâtre vivait plus près de l'invention d'iPhone", text: "Cléopâtre a vécu plus près de l'invention de l'iPhone (2007) que de la construction des pyramides de Gizeh (2560 avant JC).", category: "histoire", difficulty: 2 },
        { id: 19, title: "Le cri du canard n'écho pas", text: "Le cri du canard n'écho pas vraiment. Personne ne sait pourquoi avec certitude, mais la théorie veut que le son soit trop doux ou mal dirigé.", category: "science", difficulty: 2 },
        { id: 20, title: "Octopus à 3 cœurs", text: "La pieuvre a trois cœurs : deux branchiaux pour pomper le sang vers les branchies, et un système pour le reste du corps.", category: "science", difficulty: 2 }
    ];

    // État de l'application
    let currentIndex = 0;
    let learnedFacts = JSON.parse(localStorage.getItem('learnedFacts')) || [];
    let currentStreak = parseInt(localStorage.getItem('currentStreak')) || 0;
    let lastLearnDate = localStorage.getItem('lastLearnDate');
    let dailyFactId = parseInt(localStorage.getItem('dailyFactId')) || null;
    let lastDailyDate = localStorage.getItem('lastDailyDate');

    // Gestion du streak journalier
    function updateStreak() {
        const today = new Date().toDateString();
        if (lastLearnDate !== today) {
            if (lastLearnDate && new Date(lastLearnDate).getTime() === new Date(today).getTime() - 86400000) {
                currentStreak++;
            } else if (lastLearnDate !== today) {
                currentStreak = 1;
            }
            lastLearnDate = today;
            localStorage.setItem('lastLearnDate', lastLearnDate);
            localStorage.setItem('currentStreak', currentStreak);
        }
        document.getElementById('streakDisplay').innerHTML = currentStreak;
    }

    // Déterminer le fait du jour
    function getDailyFact() {
        const today = new Date().toDateString();
        if (lastDailyDate !== today || !dailyFactId) {
            const randomIndex = Math.floor(Math.random() * FACTS.length);
            dailyFactId = FACTS[randomIndex].id;
            lastDailyDate = today;
            localStorage.setItem('dailyFactId', dailyFactId);
            localStorage.setItem('lastDailyDate', lastDailyDate);
        }
        return FACTS.find(f => f.id === dailyFactId) || FACTS[0];
    }

    // Vérifier si un fait est appris
    function isLearned(factId) {
        return learnedFacts.some(f => f.id === factId);
    }

    // Marquer un fait comme appris
    function markAsLearned(factId) {
        if (!isLearned(factId)) {
            const fact = FACTS.find(f => f.id === factId);
            if (fact) {
                learnedFacts.push({
                    id: fact.id,
                    title: fact.title,
                    text: fact.text,
                    category: fact.category,
                    date: new Date().toISOString()
                });
                localStorage.setItem('learnedFacts', JSON.stringify(learnedFacts));
                updateStreak();
                updateStats();
                renderHistory();
                return true;
            }
        }
        return false;
    }

    // Obtenir le prochain fait non appris
    function getNextUnlearnedFact() {
        const unlearned = FACTS.filter(f => !isLearned(f.id));
        if (unlearned.length === 0) {
            // Si tout est appris, on recommence
            return FACTS[currentIndex % FACTS.length];
        }
        return unlearned[0];
    }

    let currentFact = null;

    function loadFact(fact) {
        currentFact = fact;
        document.getElementById('category').textContent = fact.category.toUpperCase();
        document.getElementById('title').textContent = fact.title;
        document.getElementById('text').textContent = fact.text;
    }

    function nextFact(direction = 'left') {
        let nextFactObj;
        if (direction === 'right') {
            markAsLearned(currentFact.id);
            nextFactObj = getNextUnlearnedFact();
        } else {
            nextFactObj = getNextUnlearnedFact();
        }
        
        if (nextFactObj) {
            loadFact(nextFactObj);
            animateCardTransition(direction);
        }
    }

    function animateCardTransition(direction) {
        const card = document.getElementById('card');
        card.classList.add(direction === 'right' ? 'swiping-right' : 'swiping-left');
        setTimeout(() => {
            card.classList.remove('swiping-right', 'swiping-left');
        }, 300);
    }

    // ==================== SWIPE GESTURES ====================
    let touchStartX = 0;
    let touchEndX = 0;
    const minSwipeDistance = 50;

    const swipeContainer = document.getElementById('swipeContainer');
    
    swipeContainer.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    
    swipeContainer.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        const deltaX = touchEndX - touchStartX;
        
        if (Math.abs(deltaX) > minSwipeDistance) {
            if (deltaX > 0) {
                // Swipe droite - J'ai appris
                nextFact('right');
            } else {
                // Swipe gauche - Suivant
                nextFact('left');
            }
        }
    });

    // ==================== VUES ====================
    function showHistory() {
        document.getElementById('historyView').classList.add('open');
        renderHistory();
    }

    function closeHistory() {
        document.getElementById('historyView').classList.remove('open');
    }

    function showStats() {
        document.getElementById('statsView').classList.add('open');
        updateStats();
    }

    function closeStats() {
        document.getElementById('statsView').classList.remove('open');
    }

    function showDaily() {
        const dailyFact = getDailyFact();
        loadFact(dailyFact);
    }

    function renderHistory() {
        const historyList = document.getElementById('historyList');
        if (learnedFacts.length === 0) {
            historyList.innerHTML = '<div style="text-align:center;color:#64748b;padding:40px;">Aucun fait appris pour le moment<br>👈 Swipez à droite pour apprendre!</div>';
            return;
        }
        historyList.innerHTML = learnedFacts.slice().reverse().map(fact => `
            <div class="history-item">
                <h3>${fact.title}</h3>
                <p>${fact.text.substring(0, 100)}...</p>
                <small style="color:#60a5fa;">${fact.category} • ${new Date(fact.date).toLocaleDateString('fr-FR')}</small>
            </div>
        `).join('');
    }

    function updateStats() {
        const uniqueCategories = new Set(learnedFacts.map(f => f.category));
        document.getElementById('statTotalLearned').textContent = learnedFacts.length;
        document.getElementById('statStreak').textContent = currentStreak;
        document.getElementById('statCategories').textContent = uniqueCategories.size;
    }

    // Navigation menu
    document.querySelectorAll('.menu-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const view = btn.dataset.view;
            if (view === 'history') showHistory();
            else if (view === 'stats') showStats();
            else if (view === 'daily') showDaily();
        });
    });

    // Bouton info
    document.getElementById('infoBtn').addEventListener('click', () => {
        alert(currentFact ? `${currentFact.title}\n\n${currentFact.text}` : "Swipez pour découvrir des faits!");
    });

    // Initialisation
    function init() {
        updateStreak();
        const dailyFact = getDailyFact();
        loadFact(dailyFact);
        renderHistory();
        updateStats();
    }

    init();
</script>
</body>
</html>
