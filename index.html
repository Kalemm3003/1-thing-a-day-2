<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Test - 1 Thing a Day 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .status {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 16px;
            backdrop-filter: blur(10px);
        }

        .update-info {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔵 1 Thing a Day 2</h1>
        <p>Site déployé sur Cloudflare Pages !</p>
        <div class="status">
            ✅ Mise à jour réussie !<br>
            Version test - Avril 2026
        </div>
        <div class="update-info">
            🔄 Les modifications sont automatiques après `git push`
        </div>
    </div>
</body>
</html>
