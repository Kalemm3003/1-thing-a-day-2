<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Daily Learn</title>
<link rel="manifest" href="manifest.json">

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(180deg,#0f172a,#111827);
color:white;
}

#app{
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:90%;
max-width:420px;
background:#1f2937;
border-radius:25px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
text-align:center;
transition:transform 0.3s ease;
}

h1{font-size:20px;}
p{opacity:0.85;font-size:14px;line-height:1.4}

.tag{
font-size:12px;
opacity:0.6;
margin-bottom:10px;
}

.btn{
margin-top:15px;
padding:10px;
border:none;
border-radius:12px;
width:100%;
background:#2563eb;
color:white;
font-size:14px;
}

</style>
</head>

<body>

<div id="app">
  <div class="card" id="card">
    <div class="tag" id="category"></div>
    <h1 id="title"></h1>
    <p id="short"></p>
    <p id="long"></p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
