<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Site OK</title>

    body {
      font-family: Arial;
      text-align: center;
      background: #e0f7ff;
      padding: 50px;

      color: #0077b6;
    }

    .box {
      background: white;
      padding: 20px;

      border: none;
      border-radius: 8px;
      background: #90e0ef;
      cursor: pointer;
    }

    button:hover {
      background: #00b4d8;
      color: white;
    }
  </style>
</head>

<body>

<h1>🐟 Test du site</h1>

<div class="box">

</html>
