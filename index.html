<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.png" />

    <title>1 Thing a Day</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app-container">

        <!-- DAILY VIEW -->
        <div id="dailyView" class="view active">
            <div id="dailyCard" class="fact-card">
                <div class="fact-category"></div>
                <h2 class="fact-title"></h2>
                <p class="fact-text"></p>

                <button id="moreInfoBtn" class="info-btn">ℹ️ En savoir plus</button>
            </div>
        </div>

        <!-- HISTORIQUE -->
        <div id="historyView" class="view">
            <h2 class="view-title">Historique</h2>
            <div id="historyList" class="history-list"></div>
        </div>

        <!-- STATS -->
        <div id="statsView" class="view">
            <h2 class="view-title">Statistiques</h2>

            <div class="stats-item">
                <span>Faits appris :</span>
                <strong id="statsLearned">0</strong>
            </div>

            <div class="stats-item">
                <span>Progression :</span>
                <strong id="statsProgress">0%</strong>
            </div>

            <div class="stats-item">
                <span>Streak actuel :</span>
                <strong id="statsStreak">0🔥</strong>
            </div>

            <div class="stats-item">
                <span>Catégories apprises :</span>
                <strong id="statsCategories">0</strong>
            </div>

            <div class="stats-item">
                <span>Difficulté moyenne :</span>
                <strong id="statsDifficulty">0</strong>
            </div>
        </div>

        <!-- POPUP MORE INFO -->
        <div id="popupMoreInfo" class="popup hidden">
            <div class="popup-content">
                <h3 id="popupTitle"></h3>
                <p id="popupText"></p>
                <button class="close-popup">Fermer</button>
            </div>
        </div>

        <!-- POPUP MOTS COMPLIQUÉS -->
        <div id="popupWord" class="popup hidden">
            <div class="popup-content">
                <h3 id="popupWordTitle"></h3>
                <p id="popupWordDefinition"></p>
                <button class="close-popup">Fermer</button>
            </div>
        </div>

        <!-- TOAST -->
        <div id="toast" class="toast"></div>

        <!-- MENU BAS -->
        <div class="bottom-menu">
            <button data-view="dailyView">📚 Daily</button>
            <button data-view="historyView">📖 Historique</button>
            <button data-view="statsView">📊 Stats</button>
        </div>

    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
