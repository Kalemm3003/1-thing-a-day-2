<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>1 Thing a Day</title>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <span id="streak">🔥 0 appris</span>
                <span class="app-title">1 Thing a Day</span>
                <div style="width: 50px;"></div> </div>
            
            <div class="theme-selector">
                <div class="theme-bubble">
                    <span id="current-theme-label">Tout</span>
                    <select id="category-select">
                        <option value="Tout">Tout</option>
                        <option value="Technologie">Technologie</option>
                        <option value="Histoire">Histoire</option>
                        <option value="Science">Science</option>
                        <option value="Nature">Nature</option>
                        <option value="Insolite">Insolite</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="card-container">
            <div id="card" class="card">
                </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="location.reload()"><span>📅</span>Daily</div>
            <div class="nav-item"><span>📖</span>Historique</div>
            <div class="nav-item"><span>📊</span>Stats</div>
        </nav>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
