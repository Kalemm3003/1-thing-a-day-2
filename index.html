<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="1 Thing a Day">
    <meta name="theme-color" content="#0f172a">
    <title>1 Thing a Day - 1 Fait par Jour</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            color: #f1f5f9;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            padding-top: env(safe-area-inset-top, 20px);
            padding-left: 24px;
            padding-right: 24px;
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .streak-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .streak-badge::before {
            content: "🔥";
            font-size: 14px;
        }

        .daily-badge {
            background: rgba(59, 130, 246, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .daily-badge::before {
            content: "📅";
            font-size: 12px;
        }

        .swipe-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: grab;
        }

        .swipe-container:active {
            cursor: grabbing;
        }

        .card {
            position: absolute;
            width: calc(100% - 32px);
            max-width: 380px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }

        .card.swiping-left {
            transform: translateX(-120%) rotate(-8deg);
            opacity: 0;
        }

        .card.swiping-right {
            transform: translateX(120%) rotate(8deg);
            opacity: 0;
        }

        .category {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            color: #60a5fa;
        }

        .card h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .card p {
            font-size: 18px;
            line-height: 1.5;
            color: #cbd5e1;
            margin-bottom: 28px;
        }

        .info-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
        }

        .info-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }

        .swipe-indicator {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: #64748b;
            display: flex;
            justify-content: center;
            gap: 32px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            margin: 0 20px;
            border-radius: 40px;
            z-index: 10;
        }

        .swipe-indicator span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bottom-menu {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 16px;
            border-radius: 24px;
        }

        .menu-item.active {
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
        }

        .menu-item span:first-child {
            font-size: 22px;
        }

        .history-view, .stats-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
            padding: 80px 20px 100px;
        }

        .history-view.open, .stats-view.open {
            transform: translateX(0);
        }

        .history-view h2, .stats-view h2 {
            font-size: 28px;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .history-item {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 3px solid #60a5fa;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:active {
            transform: scale(0.98);
            background: rgba(30, 41, 59, 0.8);
        }

        .history-item h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .history-item p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .history-item small {
            font-size: 11px;
            color: #60a5fa;
        }

        .close-btn {
            position: fixed;
            top: 60px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 24px;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 201;
            backdrop-filter: blur(10px);
        }

        .stats-card {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats-number {
            font-size: 48px;
            font-weight: 700;
            color: #60a5fa;
        }

        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 40px;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 300;
            animation: fadeOut 2s ease forwards;
            white-space: nowrap;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="status-bar">
        <div class="streak-badge" id="streakDisplay">0</div>
        <div class="daily-badge" id="dailyFactIndicator">Fait du jour</div>
    </div>

    <div class="swipe-container" id="swipeContainer">
        <div class="card" id="card">
            <div class="category" id="category">Science</div>
            <h1 id="title">Chargement...</h1>
            <p id="text">Découvrez votre premier fait du jour</p>
            <button class="info-btn" id="infoBtn">ℹ️ En savoir plus</button>
        </div>
    </div>

    <div class="swipe-indicator">
        <span>⬅️ Ignorer</span>
        <span>➡️ J'apprends</span>
    </div>

    <div class="bottom-menu">
        <button class="menu-item active" data-view="daily">
            <span>📚</span>
            <span>Daily</span>
        </button>
        <button class="menu-item" data-view="history">
            <span>📖</span>
            <span>Historique</span>
        </button>
        <button class="menu-item" data-view="stats">
            <span>📊</span>
            <span>Stats</span>
        </button>
    </div>
</div>

<div class="history-view" id="historyView">
    <button class="close-btn" onclick="closeHistory()">✕</button>
    <h2>📖 Ce que j'ai appris</h2>
    <div id="historyList"></div>
</div>

<div class="stats-view" id="statsView">
    <button class="close-btn" onclick="closeStats()">✕</button>
    <h2>📊 Mes statistiques</h2>
    <div id="statsContainer"></div>
</div>

<script>
    const FACTS = [
        { id: 1, title: "Origine du mot 'Quiz'", text: "Le mot 'quiz' vient d'un pari à Dublin au 18e siècle.", category: "langue", difficulty: 1 },
        { id: 2, title: "Les bananes sont radioactives", text: "Les bananes sont naturellement radioactives à cause de leur teneur élevée en potassium-40.", category: "science", difficulty: 1 },
        { id: 3, title: "Paul l'Octopus", text: "Paul l'Octopus est devenu célèbre en 2010 pour avoir prédit 12 matchs de la Coupe du Monde sur 14.", category: "histoire", difficulty: 2 },
        { id: 4, title: "Pourquoi les flamants sont roses", text: "Les flamants roses doivent leur couleur aux algues et crustacés qu'ils mangent, riches en bêta-carotène.", category: "science", difficulty: 1 },
        { id: 5, title: "Le premier programmeur était une femme", text: "Ada Lovelace est considérée comme la première programmeuse de l'histoire.", category: "histoire", difficulty: 2 },
        { id: 6, title: "Le jour le plus long", text: "Le solstice d'été est le jour le plus long de l'année dans l'hémisphère nord.", category: "science", difficulty: 1 },
        { id: 7, title: "Pourquoi bâille-t-on ?", text: "Le bâillement aide à refroidir le cerveau et à augmenter l'oxygénation.", category: "science", difficulty: 2 },
        { id: 8, title: "Olympus Mons", text: "Olympus Mons sur Mars est un volcan de 22 km de haut, presque trois fois l'Everest.", category: "science", difficulty: 2 },
        { id: 9, title: "Napoléon et les lapins", text: "Napoléon a un jour été attaqué par une horde de lapins lors d'une chasse.", category: "histoire", difficulty: 3 },
        { id: 10, title: "Le mot le plus long", text: "Anticonstitutionnellement (25 lettres) est souvent cité.", category: "langue", difficulty: 3 }
    ];

    let learnedFacts = JSON.parse(localStorage.getItem('learnedFacts')) || [];
    let currentStreak = parseInt(localStorage.getItem('currentStreak')) || 0;
    let lastLearnDate = localStorage.getItem('lastLearnDate');
    let dailyFactId = parseInt(localStorage.getItem('dailyFactId')) || null;
    let lastDailyDate = localStorage.getItem('lastDailyDate');
    let currentFact = null;

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function updateStreak() {
        let today = new Date().toDateString();
        if (lastLearnDate !== today) {
            if (lastLearnDate && new Date(lastLearnDate).getTime() === new Date(today).getTime() - 86400000) {
                currentStreak++;
                showToast('🔥 Streak de ' + currentStreak + ' jours !');
            } else if (lastLearnDate !== today) {
                currentStreak = 1;
            }
            lastLearnDate = today;
            localStorage.setItem('lastLearnDate', lastLearnDate);
            localStorage.setItem('currentStreak', currentStreak);
        }
        document.getElementById('streakDisplay').innerHTML = currentStreak;
    }

    function getDailyFact() {
        let today = new Date().toDateString();
        if (lastDailyDate !== today || !dailyFactId) {
            let unlearned = FACTS.filter(f => !learnedFacts.some(lf => lf.id === f.id));
            if (unlearned.length > 0) {
                dailyFactId = unlearned[Math.floor(Math.random() * unlearned.length)].id;
            } else {
                dailyFactId = FACTS[Math.floor(Math.random() * FACTS.length)].id;
            }
            lastDailyDate = today;
            localStorage.setItem('dailyFactId', dailyFactId);
            localStorage.setItem('lastDailyDate', lastDailyDate);
        }
        return FACTS.find(f => f.id === dailyFactId) || FACTS[0];
    }

    function markAsLearned(factId) {
        if (!learnedFacts.some(f => f.id === factId)) {
            let fact = FACTS.find(f => f.id === factId);
            if (fact) {
                learnedFacts.push({
                    id: fact.id,
                    title: fact.title,
                    text: fact.text,
                    category: fact.category,
                    date: new Date().toISOString()
                });
                localStorage.setItem('learnedFacts', JSON.stringify(learnedFacts));
                updateStreak();
                showToast('✅ Appris : ' + fact.title);
                return true;
            }
        }
        return false;
    }

    function getNextFact() {
        let unlearned = FACTS.filter(f => !learnedFacts.some(lf => lf.id === f.id));
        if (unlearned.length === 0) {
            showToast('🏆 Félicitations ! Tu as tout appris !');
            return FACTS[Math.floor(Math.random() * FACTS.length)];
        }
        return unlearned[0];
    }

    function loadFact(fact) {
        currentFact = fact;
        document.getElementById('category').innerHTML = fact.category.toUpperCase();
        document.getElementById('title').innerHTML = fact.title;
        document.getElementById('text').innerHTML = fact.text;
    }

    function nextFact(direction) {
        let next;
        if (direction === 'right') {
            markAsLearned(currentFact.id);
            next = getNextFact();
        } else {
            next = getNextFact();
        }
        if (next) {
            loadFact(next);
            let card = document.getElementById('card');
            card.classList.add(direction === 'right' ? 'swiping-right' : 'swiping-left');
            setTimeout(() => {
                card.classList.remove('swiping-right', 'swiping-left');
            }, 300);
        }
    }

    let touchStartX = 0;
    let swipeContainer = document.getElementById('swipeContainer');
    swipeContainer.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    swipeContainer.addEventListener('touchend', (e) => {
        let deltaX = e.changedTouches[0].screenX - touchStartX;
        if (Math.abs(deltaX) > 50) {
            nextFact(deltaX > 0 ? 'right' : 'left');
        }
    });

    function showHistory() {
        let historyList = document.getElementById('historyList');
        if (learnedFacts.length === 0) {
            historyList.innerHTML = '<div class="empty-state">📭 Aucun fait appris<br>Swipe à droite pour apprendre !</div>';
        } else {
            historyList.innerHTML = learnedFacts.slice().reverse().map(f => 
                '<div class="history-item" onclick="alert(\'' + f.title + '\\n\\n' + f.text + '\')">' +
                '<h3>' + f.title + '</h3>' +
                '<p>' + f.text.substring(0, 80) + '...</p>' +
                '<small>📂 ' + f.category + ' • ' + new Date(f.date).toLocaleDateString('fr-FR') + '</small></div>'
            ).join('');
        }
        document.getElementById('historyView').classList.add('open');
    }

    function closeHistory() {
        document.getElementById('historyView').classList.remove('open');
    }

    function showStats() {
        let uniqueCats = new Set(learnedFacts.map(f => f.category));
        let progress = Math.round((learnedFacts.length / FACTS.length) * 100);
        document.getElementById('statsContainer').innerHTML = 
            '<div class="stats-card"><div class="stats-number">' + learnedFacts.length + '</div><div>faits appris sur ' + FACTS.length + '</div>' +
            '<div style="margin-top:10px;background:#1e293b;border-radius:10px;height:8px;"><div style="width:' + progress + '%;background:#60a5fa;height:100%;border-radius:10px;"></div></div>' +
            '<div style="margin-top:8px;font-size:12px;">' + progress + '% complété</div></div>' +
            '<div class="stats-card"><div class="stats-number">' + currentStreak + '</div><div>jours consécutifs 🔥</div></div>' +
            '<div class="stats-card"><div class="stats-number">' + uniqueCats.size + '</div><div>catégories explorées</div></div>';
        document.getElementById('statsView').classList.add('open');
    }

    function closeStats() {
        document.getElementById('statsView').classList.remove('open');
    }

    function showDaily() {
        loadFact(getDailyFact());
    }

    document.querySelectorAll('.menu-item').forEach(btn => {
        btn.addEventListener('click', () => {
            let view = btn.dataset.view;
            if (view === 'daily') showDaily();
            if (view === 'history') showHistory();
            if (view === 'stats') showStats();
        });
    });
    document.getElementById('infoBtn').onclick = () => alert(currentFact ? currentFact.title + '\n\n' + currentFact.text : 'Charge...');
    window.closeHistory = closeHistory;
    window.closeStats = closeStats;

    updateStreak();
    loadFact(getDailyFact());
</script>
</body>
</html>
