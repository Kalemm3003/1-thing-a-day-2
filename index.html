<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>1 Thing a Day</title>
</head>
<body>
    <div class="app-container">
        <header>
            <span>📅 1 Thing a Day</span>
            <span id="streak">🔥 0 appris</span>
        </header>
        <div class="card-container">
            <div id="card" class="card"></div>
        </div>
        <nav class="nav-bar">
            <button class="nav-item active"><span>📅</span>Daily</button>
            <button class="nav-item"><span>📖</span>Historique</button>
            <button class="nav-item"><span>📊</span>Stats</button>
        </nav>
    </div>
    <div class="history-view" id="historyView">
        <button class="close-btn" onclick="closeHistory()">✕</button>
        <h2>📖 Historique</h2>
        <div id="historyList"></div>
    </div>
    <div class="stats-view" id="statsView">
        <button class="close-btn" onclick="closeStats()">✕</button>
        <h2>📊 Statistiques</h2>
        <div id="statsContainer"></div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
