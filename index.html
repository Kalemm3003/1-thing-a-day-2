<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Culture</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:linear-gradient(180deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#111827;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1 { font-size:20px; }
p { opacity:0.8; }

button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:16px;
}

button:hover {
  background:#1d4ed8;
}
</style>
</head>

<body>

<div class="card">
  <h1 id="question">Chargement...</h1>
  <p id="info"></p>
  <div id="answers"></div>
</div>

<script>
const questions = [
  {
    q:"D'où vient le mot 'quiz' ?",
    a:["Irlande","Japon","France"],
    good:0,
    info:"Le mot 'quiz' viendrait d'un pari à Dublin au 18e siècle."
  },
  {
    q:"Quelle est la capitale du Canada ?",
    a:["Toronto","Ottawa","Vancouver"],
    good:1,
    info:"Ottawa est la capitale officielle du Canada."
  },
  {
    q:"Qui a peint la Joconde ?",
    a:["Van Gogh","Picasso","Léonard de Vinci"],
    good:2,
    info:"La Joconde a été peinte par Léonard de Vinci."
  }
];

let i = 0;

function load() {
  let q = questions[i];
  document.getElementById("question").innerText = q.q;
  document.getElementById("info").innerText = "";

  let html = "";
  q.a.forEach((a, index) => {
    html += `<button onclick="check(${index})">${a}</button>`;
  });

  document.getElementById("answers").innerHTML = html;
}

function check(n) {
  let q = questions[i];

  if(n === q.good) {
    document.getElementById("info").innerText = "✔ " + q.info;
    setTimeout(() => {
      i = (i + 1) % questions.length;
      load();
    }, 1200);
  } else {
    document.getElementById("info").innerText = "❌ Mauvaise réponse, réessaie";
  }
}

load();
</script>

</body>
</html>
